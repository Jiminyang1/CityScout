<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1900" width="1600" height="1900">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#334155" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.25"/>
    </filter>
    <style>
      .title { font: 700 28px Inter, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 600 18px Inter, Arial, sans-serif; fill: #0f172a; }
      .lane-title { font: 700 16px Inter, Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 14px Inter, Arial, sans-serif; fill: #0f172a; }
      .mono { font: 500 13px Menlo, Consolas, monospace; fill: #0f172a; }
      .note { font: 500 13px Inter, Arial, sans-serif; fill: #334155; }
      .legend { font: 600 13px Inter, Arial, sans-serif; fill: #0f172a; }
      .lane { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1.5; rx: 12; }
      .col-head { fill: #e2e8f0; rx: 10; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 12; filter: url(#shadow); }
      .box-accent { fill: #eef2ff; stroke: #94a3b8; stroke-width: 1.5; rx: 12; filter: url(#shadow); }
      .arrow { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); fill: none; }
      .pill { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1; rx: 999; }
      .pill-text { font: 700 12px Inter, Arial, sans-serif; fill: #075985; }
    </style>
  </defs>

  <!-- Title -->
  <text x="40" y="50" class="title">CityScout Authentication Flow — Polished</text>
  <text x="40" y="78" class="note">Phone code login + Redis token session; validated per request by interceptors</text>

  <!-- Column headers (5 columns) -->
  <!-- Column widths: 280 each, gaps 20 -->
  <g transform="translate(40,100)">
    <rect width="1520" height="60" class="lane"/>
    <g transform="translate(20,12)"><rect width="280" height="36" class="col-head"/><text x="12" y="25" class="lane-title">Client</text></g>
    <g transform="translate(320,12)"><rect width="280" height="36" class="col-head"/><text x="12" y="25" class="lane-title">Controllers & Services</text></g>
    <g transform="translate(620,12)"><rect width="280" height="36" class="col-head"/><text x="12" y="25" class="lane-title">Interceptors</text></g>
    <g transform="translate(920,12)"><rect width="280" height="36" class="col-head"/><text x="12" y="25" class="lane-title">Redis</text></g>
    <g transform="translate(1220,12)"><rect width="280" height="36" class="col-head"/><text x="12" y="25" class="lane-title">MySQL</text></g>
  </g>

  <!-- Row helper lines (optional for alignment) -->
  <!-- 1) Request Code row -->
  <g transform="translate(40,180)">
    <text x="20" y="-12" class="subtitle">1) Request SMS Code</text>

    <!-- Client box -->
    <g transform="translate(60,0)">
      <rect width="260" height="150" class="box"/>
      <text x="12" y="24" class="label">POST /api/user/code?phone=&lt;phone&gt;</text>
      <text x="12" y="48" class="mono">Headers: none</text>
      <text x="12" y="76" class="note">Request a 6-digit code for phone login.</text>
    </g>

    <!-- Arrow to Controller -->
    <path d="M320,75 H380" class="arrow"/>

    <!-- Controller box -->
    <g transform="translate(380,0)">
      <rect width="260" height="150" class="box-accent"/>
      <text x="12" y="24" class="label">UserController.sendCode</text>
      <text x="12" y="48" class="mono">Validate phone (RegexUtils)</text>
      <text x="12" y="70" class="mono">Generate 6-digit code</text>
      <text x="12" y="92" class="mono">Store in Redis, TTL 2m</text>
    </g>

    <!-- Arrow to Redis -->
    <path d="M640,75 H940" class="arrow"/>

    <!-- Redis box -->
    <g transform="translate(940,0)">
      <rect width="260" height="150" class="box"/>
      <text x="12" y="24" class="label">SET login:code:&lt;phone&gt; = &lt;code&gt;</text>
      <text x="12" y="48" class="mono">EX 2 minutes</text>
      <text x="12" y="76" class="note">Used later to validate login.</text>
    </g>
  </g>

  <!-- 2) Login row -->
  <g transform="translate(40,380)">
    <text x="20" y="-12" class="subtitle">2) Login (Phone + Code)</text>

    <!-- Client -->
    <g transform="translate(60,0)">
      <rect width="260" height="190" class="box"/>
      <text x="12" y="24" class="label">POST /api/user/login</text>
      <text x="12" y="48" class="mono">Body {"phone":"...","code":"..."}</text>
      <text x="12" y="76" class="note">On success: save token and send</text>
      <text x="12" y="98" class="note">header authorization: &lt;token&gt; on requests.</text>
    </g>

    <path d="M320,95 H380" class="arrow"/>

    <!-- Controller/Service -->
    <g transform="translate(380,0)">
      <rect width="260" height="190" class="box-accent"/>
      <text x="12" y="24" class="label">UserController.login -&gt; UserService.userLogin</text>
      <text x="12" y="48" class="mono">1) Validate phone format</text>
      <text x="12" y="70" class="mono">2) Check Redis code, else fail</text>
      <text x="12" y="92" class="mono">3) Find user by phone</text>
      <text x="12" y="114" class="mono">   - Create if not exists</text>
      <text x="12" y="136" class="mono">4) token = UUID + "_" + userId</text>
    </g>

    <path d="M640,95 H940" class="arrow"/>

    <!-- Redis session save -->
    <g transform="translate(940,0)">
      <rect width="260" height="190" class="box"/>
      <text x="12" y="24" class="label">HSET login:token:&lt;token&gt;</text>
      <text x="12" y="48" class="mono">id, nickName, icon, ...</text>
      <text x="12" y="70" class="mono">EXPIRE ... 36000m</text>
      <text x="12" y="92" class="note">Stores session as a hash.</text>
    </g>

    <!-- Arrow back to client (response) -->
    <path d="M940,170 H320" class="arrow"/>
    <text x="520" y="188" class="mono">200 OK {"data":"&lt;token&gt;"}</text>
  </g>

  <!-- 3) Per-request Validation row -->
  <g transform="translate(40,620)">
    <text x="20" y="-12" class="subtitle">3) Per-request Validation (Interceptors)</text>

    <!-- Client request -->
    <g transform="translate(60,0)">
      <rect width="260" height="150" class="box"/>
      <text x="12" y="24" class="label">Request /api/**</text>
      <text x="12" y="48" class="mono">authorization: &lt;token&gt; (optional)</text>
      <text x="12" y="76" class="note">Public endpoints work without token.</text>
    </g>

    <path d="M320,75 H660" class="arrow"/>

    <!-- RefreshTokenInterceptor -->
    <g transform="translate(620,0)">
      <rect width="260" height="150" class="box-accent"/>
      <text x="12" y="24" class="label">RefreshTokenInterceptor</text>
      <text x="12" y="48" class="mono">Read header authorization</text>
      <text x="12" y="70" class="mono">If token format ok: load from Redis</text>
      <text x="12" y="92" class="mono">If found: map to UserDTO, refresh TTL</text>
    </g>

    <path d="M880,75 H940" class="arrow"/>

    <!-- Redis read/expire -->
    <g transform="translate(940,0)">
      <rect width="260" height="150" class="box"/>
      <text x="12" y="24" class="label">HGETALL login:token:&lt;token&gt;</text>
      <text x="12" y="48" class="mono">EXPIRE ... 36000m</text>
    </g>
  </g>

  <!-- 3b) Authorization row -->
  <g transform="translate(40,800)">
    <text x="20" y="-12" class="subtitle">3b) Authorization (Protected Endpoints)</text>

    <g transform="translate(60,0)">
      <rect width="260" height="130" class="box"/>
      <text x="12" y="24" class="label">Protected examples</text>
      <text x="12" y="48" class="mono">/api/user/me</text>
      <text x="12" y="70" class="mono">/api/voucher-order/**</text>
    </g>

    <path d="M320,65 H660" class="arrow"/>

    <g transform="translate(620,0)">
      <rect width="260" height="130" class="box-accent"/>
      <text x="12" y="24" class="label">LoginInterceptor</text>
      <text x="12" y="48" class="mono">If no UserHolder user: 401</text>
      <text x="12" y="70" class="mono">Else: proceed to controller</text>
    </g>
  </g>

  <!-- 4) Logout row -->
  <g transform="translate(40,980)">
    <text x="20" y="-12" class="subtitle">4) Logout</text>

    <g transform="translate(60,0)">
      <rect width="260" height="120" class="box"/>
      <text x="12" y="24" class="label">POST /api/user/logout</text>
      <text x="12" y="48" class="mono">authorization: &lt;token&gt;</text>
    </g>

    <path d="M320,60 H380" class="arrow"/>

    <g transform="translate(380,0)">
      <rect width="260" height="120" class="box-accent"/>
      <text x="12" y="24" class="label">UserController.logout -&gt; Service.logout</text>
      <text x="12" y="48" class="mono">DEL login:token:&lt;token&gt;</text>
    </g>

    <path d="M640,60 H940" class="arrow"/>

    <g transform="translate(940,0)">
      <rect width="260" height="120" class="box"/>
      <text x="12" y="24" class="label">Redis</text>
      <text x="12" y="48" class="mono">Key removed</text>
    </g>
  </g>

  <!-- Footer legend -->
  <g transform="translate(40,1140)">
    <rect width="1520" height="160" class="lane"/>
    <text x="20" y="36" class="legend">Header: authorization</text>
    <text x="300" y="36" class="legend">Token format: &lt;UUID&gt;_&lt;userId&gt;</text>
    <text x="680" y="36" class="legend">Regex: ^[0-9a-f-]{36}_\d+$</text>
    <text x="20" y="64" class="legend">Redis keys:</text>
    <text x="140" y="64" class="mono">login:code:&lt;phone&gt; (2m)</text>
    <text x="360" y="64" class="mono">login:token:&lt;token&gt; (hash, 36000m)</text>
    <text x="20" y="92" class="legend">Public endpoints:</text>
    <text x="170" y="92" class="mono">/api/user/code, /api/user/login, /api/blog/hot, /api/shop/**, /api/shop-type/**, /api/voucher/**, /api/upload/**</text>
    <text x="20" y="120" class="legend">All routes prefixed with /api (WebConfig)</text>
  </g>
</svg>

