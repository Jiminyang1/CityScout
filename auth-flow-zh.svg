<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1900" width="1600" height="1900">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#334155" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.25"/>
    </filter>
    <style>
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 600 18px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; }
      .lane-title { font: 700 16px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 14px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; }
      .mono { font: 500 13px Menlo, Consolas, monospace; fill: #0f172a; }
      .note { font: 500 13px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #334155; }
      .legend { font: 600 13px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; }
      .lane { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1.5; rx: 12; }
      .col-head { fill: #e2e8f0; rx: 10; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 12; filter: url(#shadow); }
      .box-accent { fill: #eef2ff; stroke: #94a3b8; stroke-width: 1.5; rx: 12; filter: url(#shadow); }
      .arrow { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>

  <!-- 标题 -->
  <text x="40" y="50" class="title">CityScout 认证流程（短信验证码 + Token）</text>
  <text x="40" y="78" class="note">短信验证码登录 + 基于 Redis 的 Token 会话；拦截器按请求验证并刷新</text>

  <!-- 列标题（5 列） -->
  <g transform="translate(40,100)">
    <rect width="1520" height="60" class="lane"/>
    <g transform="translate(20,12)"><rect width="280" height="36" class="col-head"/><text x="12" y="25" class="lane-title">客户端</text></g>
    <g transform="translate(320,12)"><rect width="280" height="36" class="col-head"/><text x="12" y="25" class="lane-title">控制器与服务</text></g>
    <g transform="translate(620,12)"><rect width="280" height="36" class="col-head"/><text x="12" y="25" class="lane-title">拦截器</text></g>
    <g transform="translate(920,12)"><rect width="280" height="36" class="col-head"/><text x="12" y="25" class="lane-title">Redis</text></g>
    <g transform="translate(1220,12)"><rect width="280" height="36" class="col-head"/><text x="12" y="25" class="lane-title">MySQL</text></g>
  </g>

  <!-- 1) 获取验证码 -->
  <g transform="translate(40,180)">
    <text x="20" y="-12" class="subtitle">1）获取短信验证码</text>

    <g transform="translate(60,0)">
      <rect width="260" height="150" class="box"/>
      <text x="12" y="24" class="label">POST /api/user/code?phone=&lt;phone&gt;</text>
      <text x="12" y="48" class="mono">Headers: none</text>
      <text x="12" y="76" class="note">请求 6 位数字验证码用于登录。</text>
    </g>

    <path d="M320,75 H380" class="arrow"/>

    <g transform="translate(380,0)">
      <rect width="260" height="150" class="box-accent"/>
      <text x="12" y="24" class="label">UserController.sendCode</text>
      <text x="12" y="48" class="mono">校验手机号（RegexUtils）</text>
      <text x="12" y="70" class="mono">生成 6 位验证码</text>
      <text x="12" y="92" class="mono">写入 Redis，TTL 2 分钟</text>
    </g>

    <path d="M640,75 H940" class="arrow"/>

    <g transform="translate(940,0)">
      <rect width="260" height="150" class="box"/>
      <text x="12" y="24" class="label">SET login:code:&lt;phone&gt; = &lt;code&gt;</text>
      <text x="12" y="48" class="mono">EX 2 minutes</text>
      <text x="12" y="76" class="note">登录时用于校验验证码。</text>
    </g>
  </g>

  <!-- 2) 登录 -->
  <g transform="translate(40,380)">
    <text x="20" y="-12" class="subtitle">2）登录（手机号 + 验证码）</text>

    <g transform="translate(60,0)">
      <rect width="260" height="190" class="box"/>
      <text x="12" y="24" class="label">POST /api/user/login</text>
      <text x="12" y="48" class="mono">Body {"phone":"...","code":"..."}</text>
      <text x="12" y="76" class="note">成功后保存 token；后续请求</text>
      <text x="12" y="98" class="note">在请求头 authorization 传递。</text>
    </g>

    <path d="M320,95 H380" class="arrow"/>

    <g transform="translate(380,0)">
      <rect width="260" height="190" class="box-accent"/>
      <text x="12" y="24" class="label">UserController.login -&gt; UserService.userLogin</text>
      <text x="12" y="48" class="mono">1) 校验手机号格式</text>
      <text x="12" y="70" class="mono">2) 校验 Redis 中验证码</text>
      <text x="12" y="92" class="mono">3) 按手机号查用户</text>
      <text x="12" y="114" class="mono">   - 不存在则创建用户</text>
      <text x="12" y="136" class="mono">4) token = UUID + "_" + userId</text>
    </g>

    <path d="M640,95 H940" class="arrow"/>

    <g transform="translate(940,0)">
      <rect width="260" height="190" class="box"/>
      <text x="12" y="24" class="label">HSET login:token:&lt;token&gt;</text>
      <text x="12" y="48" class="mono">id, nickName, icon, ...</text>
      <text x="12" y="70" class="mono">EXPIRE ... 36000m</text>
      <text x="12" y="92" class="note">会话以 Hash 形式存储。</text>
    </g>

    <path d="M940,170 H320" class="arrow"/>
    <text x="520" y="188" class="mono">200 OK {"data":"&lt;token&gt;"}</text>
  </g>

  <!-- 3) 每请求校验 -->
  <g transform="translate(40,620)">
    <text x="20" y="-12" class="subtitle">3）每请求校验（拦截器）</text>

    <g transform="translate(60,0)">
      <rect width="260" height="150" class="box"/>
      <text x="12" y="24" class="label">请求 /api/**</text>
      <text x="12" y="48" class="mono">authorization: &lt;token&gt;（可选）</text>
      <text x="12" y="76" class="note">公共接口无需 token。</text>
    </g>

    <path d="M320,75 H660" class="arrow"/>

    <g transform="translate(620,0)">
      <rect width="260" height="150" class="box-accent"/>
      <text x="12" y="24" class="label">RefreshTokenInterceptor</text>
      <text x="12" y="48" class="mono">读取 authorization 头</text>
      <text x="12" y="70" class="mono">格式正确则从 Redis 加载</text>
      <text x="12" y="92" class="mono">若存在：映射 UserDTO 并刷新 TTL</text>
    </g>

    <path d="M880,75 H940" class="arrow"/>

    <g transform="translate(940,0)">
      <rect width="260" height="150" class="box"/>
      <text x="12" y="24" class="label">HGETALL login:token:&lt;token&gt;</text>
      <text x="12" y="48" class="mono">EXPIRE ... 36000m</text>
    </g>
  </g>

  <!-- 3b) 授权拦截 -->
  <g transform="translate(40,800)">
    <text x="20" y="-12" class="subtitle">3b）授权拦截（保护接口）</text>

    <g transform="translate(60,0)">
      <rect width="260" height="130" class="box"/>
      <text x="12" y="24" class="label">典型保护接口</text>
      <text x="12" y="48" class="mono">/api/user/me</text>
      <text x="12" y="70" class="mono">/api/voucher-order/**</text>
    </g>

    <path d="M320,65 H660" class="arrow"/>

    <g transform="translate(620,0)">
      <rect width="260" height="130" class="box-accent"/>
      <text x="12" y="24" class="label">LoginInterceptor</text>
      <text x="12" y="48" class="mono">无 UserHolder 用户：返回 401</text>
      <text x="12" y="70" class="mono">否则：放行到控制器</text>
    </g>
  </g>

  <!-- 4) 登出 -->
  <g transform="translate(40,980)">
    <text x="20" y="-12" class="subtitle">4）登出</text>

    <g transform="translate(60,0)">
      <rect width="260" height="120" class="box"/>
      <text x="12" y="24" class="label">POST /api/user/logout</text>
      <text x="12" y="48" class="mono">authorization: &lt;token&gt;</text>
    </g>

    <path d="M320,60 H380" class="arrow"/>

    <g transform="translate(380,0)">
      <rect width="260" height="120" class="box-accent"/>
      <text x="12" y="24" class="label">UserController.logout -&gt; Service.logout</text>
      <text x="12" y="48" class="mono">DEL login:token:&lt;token&gt;</text>
    </g>

    <path d="M640,60 H940" class="arrow"/>

    <g transform="translate(940,0)">
      <rect width="260" height="120" class="box"/>
      <text x="12" y="24" class="label">Redis</text>
      <text x="12" y="48" class="mono">删除对应会话键</text>
    </g>
  </g>

  <!-- 说明 -->
  <g transform="translate(40,1140)">
    <rect width="1520" height="160" class="lane"/>
    <text x="20" y="36" class="legend">请求头：authorization</text>
    <text x="260" y="36" class="legend">Token 格式：&lt;UUID&gt;_&lt;userId&gt;</text>
    <text x="600" y="36" class="legend">正则：^[0-9a-f-]{36}_\d+$</text>
    <text x="20" y="64" class="legend">Redis 键：</text>
    <text x="130" y="64" class="mono">login:code:&lt;phone&gt;（2 分钟）</text>
    <text x="360" y="64" class="mono">login:token:&lt;token&gt;（Hash，36000 分钟）</text>
    <text x="20" y="92" class="legend">公共接口：</text>
    <text x="130" y="92" class="mono">/api/user/code, /api/user/login, /api/blog/hot, /api/shop/**, /api/shop-type/**, /api/voucher/**, /api/upload/**</text>
    <text x="20" y="120" class="legend">所有接口均添加 /api 前缀（WebConfig）</text>
  </g>
</svg>

